name: inventory
description: "Your real life inventory."
publish_to: 'none'


version: 0.0.1+1


environment:
  sdk: '>=3.4.4 <4.0.0'


dependencies:
  # Pre-installed
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera
  camera: ^0.11.1

  # Classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Database
  objectbox: ^4.3.0
  objectbox_flutter_libs: any
  path: ^1.9.1
  path_provider: ^2.1.5

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation and Routing
  go_router: ^15.1.3

  # State management
  flutter_bloc: ^9.1.1

  # Streams
  rxdart: ^0.28.0

  # Tests
  bloc_test: ^10.0.0
  mocktail: ^1.0.4


dev_dependencies:
  # Pre-installed
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Classes
  freezed: ^3.0.6
  json_serializable: ^6.9.0

  # Database
  objectbox_generator: any

  # Dependency injection
  injectable_generator: ^2.5.0

  # Helpers
  build_runner: ^2.4.15


flutter:
  uses-material-design: true
